name: "Extension Loader"
id: "loader"
description: "Core extension that persists other extensions between SteamOS updates (required)"
version: "1.0.0"
category: "system"
release_status: release
required: true

activation:
  mode: reboot

config:
  path: /var/lib/extensions-config/loader
  parameters:
    - id: enable_persistence
      type: boolean
      label: Enable Persistence
      description: "Persist extensions across SteamOS updates. Disable if experiencing boot issues. When disabled, you'll need to manually re-mount extensions after updates."
      default: true

configure:
  script: ./configure

uninstall:
  script: ./uninstall
